<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/rerun-icon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#080b14" />
    <meta name="description" content="A personal TV tracker for keeping up with the shows you watch." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Rerun" />
    <title>Rerun</title>
    <style>
      /* Keep these first-paint literals synchronized with src/index.css tokens. */
      :root {
        --canvas-atmosphere:
          radial-gradient(ellipse 80% 62% at 18% 0%, rgba(73, 117, 255, 0.13) 0%, transparent 72%),
          radial-gradient(ellipse 70% 56% at 92% 8%, rgba(139, 120, 255, 0.09) 0%, transparent 70%),
          radial-gradient(ellipse 100% 44% at 50% 100%, rgba(32, 56, 112, 0.08) 0%, transparent 72%),
          linear-gradient(to bottom, transparent 0%, transparent 68%, rgba(3, 6, 14, 0.18) 100%),
          #080b14;
      }
      :root {
        background: #080b14;
      }
      body {
        background: var(--canvas-atmosphere);
        background-repeat: no-repeat;
        background-size: 100% 100%;
      }
      body { margin: 0; color: #f1f3f8; }
      .app-loading-shell {
        box-sizing: border-box;
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        color: #f1f3f8;
        font: 600 1rem system-ui, -apple-system, sans-serif;
        letter-spacing: 0.06em;
        padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px)
          env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
      }
      .app-loading-shell__mark {
        display: grid;
        justify-items: center;
        gap: 0.85rem;
      }
      .app-loading-shell__icon {
        width: 4.25rem;
        height: 4.25rem;
        filter: drop-shadow(0 10px 26px rgba(37, 82, 255, 0.28));
      }
      .app-loading-shell__wordmark {
        color: #e7ebff;
        font-size: 1.05rem;
      }
      @media (prefers-reduced-motion: no-preference) {
        .app-loading-shell__mark {
          animation: rerun-shell-settle 420ms cubic-bezier(0.16, 1, 0.3, 1) both;
        }
      }
      @keyframes rerun-shell-settle {
        from {
          opacity: 0;
          transform: translateY(6px) scale(0.97);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-loading" class="app-loading-shell" role="status" aria-live="polite" aria-label="Loading Rerun">
      <div class="app-loading-shell__mark">
        <svg class="app-loading-shell__icon" viewBox="0 0 1024 1024" role="img" aria-hidden="true">
          <defs>
            <linearGradient id="shellBg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#121726" />
              <stop offset="0.55" stop-color="#0f1320" />
              <stop offset="1" stop-color="#090c14" />
            </linearGradient>
            <linearGradient id="shellMark" x1="0.15" y1="0.1" x2="0.85" y2="0.9">
              <stop offset="0" stop-color="#84a7ff" />
              <stop offset="0.45" stop-color="#4f7dff" />
              <stop offset="1" stop-color="#1f5cff" />
            </linearGradient>
          </defs>
          <rect width="1024" height="1024" rx="230" fill="url(#shellBg)" />
          <g transform="translate(0 -48)">
            <g fill="none" stroke="url(#shellMark)" stroke-linecap="round" stroke-linejoin="round">
              <path d="M406 302 L512 408 L618 302" stroke-width="54" />
              <path d="M278 420 C220 420 176 465 176 522 V690 C176 760 226 810 296 810 H382" stroke-width="58" />
              <path d="M642 810 H728 C798 810 848 760 848 690 V522 C848 465 804 420 746 420 H278" stroke-width="58" />
              <path d="M646 724 C709 770 728 854 688 922 C646 992 550 1004 492 948 C451 908 446 848 468 800" stroke-width="58" />
            </g>
            <path d="M462 748 L542 784 L474 838 Z" fill="url(#shellMark)" />
          </g>
        </svg>
        <span class="app-loading-shell__wordmark">Rerun</span>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
