name: Cleanup unaired watched episodes

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Delete the bad rows (off = dry run, only prints what would be deleted)'
        type: boolean
        default: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run cleanup script
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ "${{ inputs.confirm }}" = "true" ]; then
            node scripts/cleanup-unaired-watched.js --confirm
          else
            node scripts/cleanup-unaired-watched.js
          fi
