name: Episode notifications

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Dry-run evaluates only; live also requires RERUN_NOTIFICATIONS_ENABLED=true'
        type: choice
        options:
          - dry-run
          - live
        default: dry-run

concurrency:
  group: rerun-episode-notifications
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Evaluate and notify
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          RERUN_NOTIFICATIONS_ENABLED: ${{ vars.RERUN_NOTIFICATIONS_ENABLED }}
          RERUN_NOTIFICATIONS_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'dry-run' }}
        run: node scripts/notifications/worker.js
