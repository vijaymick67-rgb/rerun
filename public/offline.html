<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f1115" />
    <title>RERUN is offline</title>
    <style>
      :root { color-scheme: dark; background: #0f1115; }
      * { box-sizing: border-box; }
      body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: max(24px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left)); background: #0f1115; color: #e5e7eb; font: 16px/1.5 system-ui, sans-serif; text-align: center; }
      main { max-width: 320px; }
      .mark { width: 64px; height: 64px; margin: 0 auto 20px; display: grid; place-items: center; border: 1px solid #2a2e38; border-radius: 16px; background: #171a21; color: #5b8def; font-size: 20px; font-weight: 700; }
      h1 { margin: 0; font-size: 20px; }
      p { margin: 8px 0 20px; color: #9199a8; }
      button { min-height: 44px; padding: 0 20px; border: 0; border-radius: 8px; background: #5b8def; color: #0f1115; font: 600 14px system-ui, sans-serif; cursor: pointer; }
      button:focus-visible { outline: 3px solid #e5e7eb; outline-offset: 3px; }
      @media (prefers-reduced-motion: reduce) { * { scroll-behavior: auto !important; } }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">R</div>
      <h1>RERUN is offline</h1>
      <p>Live TV data and tracking updates need an internet connection.</p>
      <button type="button" onclick="window.location.reload()">Retry</button>
    </main>
  </body>
</html>
